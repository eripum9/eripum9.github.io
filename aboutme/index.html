<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>About Me</title>
  <meta name="description" content="Your Favourite Coder, Youtuber and Femboy." />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d10;
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.07);
      --text: #e4e8ef;
      --muted: #7a8fa3;
      --accent: #6ee7b7;
      --accent-glow: rgba(110,231,183,0.35);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(110,231,183,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(99,102,241,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 48px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-link {
      align-self: flex-start;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; }

    .avatar-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      animation: ringPulse 4s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
      50%      { box-shadow: 0 0 36px var(--accent-glow), 0 0 60px rgba(110,231,183,0.1); }
    }
    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--bg);
    }

    .profile-name {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
    }
    .profile-bio {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.5;
      max-width: 340px;
    }

    .description-box {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px 20px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.6;
      text-align: center;
      transition: border-color 0.3s;
    }
    .description-box:hover {
      border-color: rgba(110,231,183,0.15);
    }

    .social-links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 0.92rem;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-sm);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .social-link:hover {
      transform: translateY(-2px);
      border-color: transparent;
    }

    .social-link:hover .social-icon {
      filter: drop-shadow(0 0 8px var(--link-glow, var(--accent-glow)));
    }

    .social-link:active {
      transform: translateY(0);
    }

    .social-link.yt        { --link-color: #ff0000; --link-glow: rgba(255,0,0,0.4); }
    .social-link.gh        { --link-color: #e4e8ef; --link-glow: rgba(228,232,239,0.3); }
    .social-link.dc        { --link-color: #5865f2; --link-glow: rgba(88,101,242,0.4); }
    .social-link.ig        { --link-color: #e1306c; --link-glow: rgba(225,48,108,0.4); }
    .social-link.roblox    { --link-color: #e2231a; --link-glow: rgba(226,35,26,0.4); }
    .social-link.twitch    { --link-color: #9146ff; --link-glow: rgba(145,70,255,0.4); }
    .social-link.spotify   { --link-color: #1db954; --link-glow: rgba(29,185,84,0.4); }

    .social-link:hover {
      background: rgba(255,255,255,0.06);
      box-shadow: 0 4px 24px -4px var(--link-glow, var(--accent-glow));
      border-color: var(--link-color, var(--accent));
    }

    .social-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      transition: filter 0.3s ease;
    }

    .social-icon svg {
      width: 100%;
      height: 100%;
    }

    .social-link-label {
      flex: 1;
    }

    .social-link-arrow {
      color: var(--muted);
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.25s ease;
    }
    .social-link:hover .social-link-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .about-footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.75rem;
    }

    @media (max-width: 480px) {
      .page { padding: 32px 16px 32px; }
      .avatar-ring { width: 80px; height: 80px; }
      .profile-name { font-size: 1.2rem; }
    }
  </style>
</head>
